<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイポータル</title>

    <!-- ファビコン -->
    <link rel="icon" href="data:image/svg+xml,
        <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
            <text y='.9em' font-size='90'>🚀</text>
        </svg>">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #002d62;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            padding: 20px;
        }

        .tile {
            aspect-ratio: 16 / 9;
            border: 4px solid #1e4d8c;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            font-size: 0.85rem;
            padding: 4px;
        }

        .tile:hover {
            opacity: 0.8;
            transform: scale(1.02);
        }

        .tile-empty {
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px dashed #1e4d8c;
            cursor: default;
        }

        .tile-empty:hover {
            transform: none;
            opacity: 1;
        }

        /* 色 */
        .color-default { background-color: #dbeafe; }
        .color-yellow  { background-color: #fef3c7; }
        .color-green   { background-color: #ecfccb; }
        .color-orange  { background-color: #ffedd5; }
        .color-gray    { background-color: #d1d5db; }
        .color-white   { background-color: #f3f4f6; }

        .edit-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            padding: 5px;
            font-size: 10px;
            z-index: 10;
        }

        .editing .edit-overlay {
            display: flex;
        }

        .admin-bar {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        /* ===== メモ欄 ===== */
        .memo-container {
            padding: 0 20px 20px;
        }

        #memo {
            width: 100%;
            min-height: 120px;
            resize: vertical;
            padding: 10px;
            font-size: 14px;
            border-radius: 6px;
            border: 2px solid #1e4d8c;
            background-color: #f3f4f6;
            color: #000;
        }
    </style>
</head>

<body>

    <div class="admin-bar">
        <h1 class="text-xl font-bold">My Portal</h1>
        <div class="flex items-center gap-4">
            <label class="inline-flex items-center cursor-pointer">
                <input type="checkbox" id="editModeToggle" class="sr-only peer">
                <div class="relative w-11 h-6 bg-gray-600 rounded-full
                    peer-checked:bg-blue-600
                    after:content-[''] after:absolute after:top-[2px] after:start-[2px]
                    after:bg-white after:border after:rounded-full after:h-5 after:w-5
                    after:transition-all peer-checked:after:translate-x-full">
                </div>
                <span class="ms-3 text-sm">編集モード</span>
            </label>
            <button onclick="resetData()"
                class="text-xs bg-red-800 hover:bg-red-700 px-2 py-1 rounded">
                すべての内容をクリア
            </button>
        </div>
    </div>

    <!-- タイル -->
    <div id="grid" class="grid-container"></div>

    <!-- メモ欄 -->
    <div class="memo-container">
        <textarea id="memo"
            placeholder="メモ欄（自由に記入できます）"
            oninput="saveMemo()"></textarea>
    </div>

<script>
const ROWS = 5;
const COLS = 8;
const STORAGE_KEY = 'portal_tiles_data';
const MEMO_STORAGE_KEY = 'portal_memo';

let tilesData = [];
let isEditMode = false;

/* ===== データ ===== */
function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    tilesData = saved ? JSON.parse(saved) : [];
    renderGrid();
}

function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tilesData));
}

/* ===== メモ ===== */
function loadMemo() {
    const memo = localStorage.getItem(MEMO_STORAGE_KEY);
    if (memo !== null) {
        document.getElementById('memo').value = memo;
    }
}

function saveMemo() {
    localStorage.setItem(
        MEMO_STORAGE_KEY,
        document.getElementById('memo').value
    );
}

/* ===== 描画 ===== */
function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    for (let i = 0; i < ROWS * COLS; i++) {
        const data = tilesData.find(t => t.id === i);
        const hasData = data && (data.text || data.url);

        const tile = document.createElement('div');

        if (!hasData && !isEditMode) {
            tile.className = 'tile tile-empty';
        } else {
            const current = data || { id: i, text: '', url: '', color: 'color-default' };

            tile.className = `tile ${current.color} ${isEditMode ? 'editing' : ''}`;
            tile.innerHTML = `
                <span class="tile-text">${current.text}</span>
                <div class="edit-overlay" onclick="event.stopPropagation()">
                    <input value="${current.text}"
                        placeholder="ボタン名"
                        oninput="updateTile(${i}, 'text', this.value)"
                        class="mb-1 p-1 border rounded">

                    <input value="${current.url}"
                        placeholder="URL"
                        oninput="updateTile(${i}, 'url', this.value)"
                        class="mb-1 p-1 border text-[8px] rounded">

                    <select onchange="updateTile(${i}, 'color', this.value)"
                        class="p-1 border rounded">
                        <option value="color-default">青</option>
                        <option value="color-yellow">黄</option>
                        <option value="color-green">緑</option>
                        <option value="color-orange">橙</option>
                        <option value="color-gray">灰</option>
                        <option value="color-white">白</option>
                    </select>
                </div>
            `;

            tile.onclick = () => {
                if (!isEditMode && current.url) {
                    window.open(current.url, '_blank');
                }
            };
        }

        grid.appendChild(tile);
    }
}

/* ===== 更新 ===== */
function updateTile(id, key, value) {
    const idx = tilesData.findIndex(t => t.id === id);

    if (idx === -1) {
        const t = { id, text: '', url: '', color: 'color-default' };
        t[key] = value;
        tilesData.push(t);
    } else {
        tilesData[idx][key] = value;
    }

    saveData();
    renderGrid();
}

/* ===== リセット ===== */
function resetData() {
    if (confirm('すべて消去しますか？')) {
        tilesData = [];
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(MEMO_STORAGE_KEY);
        document.getElementById('memo').value = '';
        renderGrid();
    }
}

/* ===== 編集モード ===== */
document.getElementById('editModeToggle').addEventListener('change', e => {
    isEditMode = e.target.checked;
    renderGrid();
});

/* 初期化 */
window.onload = () => {
    loadData();
    loadMemo();
};
</script>

</body>
</html>
